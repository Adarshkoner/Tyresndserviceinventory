<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tire Inventory System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.23/jspdf.plugin.autotable.min.js"></script>
</head>
<body class="bg-gray-100 font-sans">

    <nav class="bg-slate-800 text-white p-4 shadow-lg sticky top-0 z-50">
        <div class="max-w-4xl mx-auto flex justify-around">
            <button onclick="showPage('entry')" class="hover:text-blue-400 font-bold uppercase tracking-wider">Entry</button>
            <button onclick="showPage('stock')" class="hover:text-blue-400 font-bold uppercase tracking-wider">Stock</button>
            <button onclick="showPage('history')" class="hover:text-blue-400 font-bold uppercase tracking-wider">History</button>
        </div>
    </nav>

    <div class="max-w-4xl mx-auto p-6">
        
        <section id="entry" class="page-content">
            <div class="bg-white p-8 rounded-xl shadow-md">
                <h2 class="text-2xl font-bold mb-6 text-gray-800 border-b pb-2">New Entry</h2>
                <form id="entryForm" class="space-y-4">
                    <div>
                        <label class="block text-sm font-medium text-gray-700">Tire Size</label>
                        <select id="size" class="w-full p-2 border rounded-md mt-1" required>
                            <option value="145/80 R12(sturdo)">145/80 R12(sturdo)</option>
                            <option value="145/80 R12(S248)">145/80 R12(S248)</option>
                            <option value="145/70 R13(sturdo)">145/70 R13(sturdo)</option>
                            <option value="145/80 R13(sturdo)">145/80 R13(sturdo)</option>
                            <option value="155/80 R13 LT(L607)">155/80 R13 LT(L607)</option>
                            <option value="155/65 R13(sturdo)">155/65 R13(sturdo)</option>
                            <option value="155/80 R13(sturdo)">155/80 R13(sturdo)</option>
                            <option value="155/70 R13(sturdo)">155/70 R13(sturdo)</option>
                            <option value="165/65 R14(sturdo)">165/65 R14(sturdo)</option>
                            <option value="175/70 R14(sturdo)">175/70 R14(sturdo)</option>
                            <option value="175/65 R14(sturdo)">175/65 R14(sturdo)</option>
                            <option value="155/65 R14(sturdo)">155/65 R14(sturdo)</option>
                            <option value="165/80 R14(sturdo)">165/80 R14(sturdo)</option>
                            <option value="185/65 R14(sturdo)">185/65 R14(sturdo)</option>
                            <option value="165/70 R14(sturdo)">165/70 R14(sturdo)</option>
                            <option value="185/70 R14(sturdo)">185/70 R14(sturdo)</option>
                            <option value="185/65 R15(sturdo)">185/65 R15(sturdo)</option>
                            <option value="175/60 R15(sturdo)">175/60 R15(sturdo)</option>
                            <option value="195/60 R15(sturdo)">195/60 R15(sturdo)</option>
                            <option value="195/65 R15(sturdo)">195/65 R15(sturdo)</option>
                            <option value="215/75 R15(HT D689)">215/75 R15(HT D689)</option>
                            <option value="215/75 R15(AT D689)">215/75 R15(AT D689)</option>
                            <option value="205/65 R15(B390)">205/65 R15(B390)</option>
                            <option value="195/55 R16(sturdo)">195/55 R16(sturdo)</option>
                            <option value="215/60 R16(Turanza)">215/60 R16(Turanza)</option>
                            <option value="235/70 R16(D689)">235/70 R16(D689)</option>
                            <option value="205/65 R16(B390)">205/65 R16(B390)</option>
                            <option value="195/60 R16(T001)">195/60 R16(T001)</option>
                            <option value="215/60 R17(DHP)">215/60 R17(DHP)</option>
                            <option value="215/55 R17(Turanza)">215/55 R17(Turanza)</option>
                            <option value="235/65 R17(D684)">235/65 R17(D684)</option>
                            <option value="215/55 R18(Turanza 6i)">215/55 R18(Turanza 6i)</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700">Transaction Type</label>
                        <select id="type" class="w-full p-2 border rounded-md mt-1" required>
                            <option value="Purchase">Purchase (Add to Stock)</option>
                            <option value="Sales">Sales (Subtract from Stock)</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700">Quantity</label>
                        <input type="number" id="qty" min="1" class="w-full p-2 border rounded-md mt-1" placeholder="Enter amount" required>
                    </div>
                    <button type="submit" class="w-full bg-blue-600 text-white py-3 rounded-md hover:bg-blue-700 transition">Submit Entry</button>
                </form>
            </div>
        </section>

        <section id="stock" class="page-content hidden">
            <div class="bg-white p-8 rounded-xl shadow-md">
                <div class="flex justify-between items-center mb-6">
                    <h2 class="text-2xl font-bold text-gray-800">Current Inventory</h2>
                    <button onclick="exportPDF()" class="bg-green-600 text-white px-4 py-2 rounded hover:bg-green-700">Latest Stock (PDF)</button>
                </div>
                <table id="stockTable" class="w-full text-left border-collapse">
                    <thead>
                        <tr class="bg-gray-50 border-b">
                            <th class="p-3">Tire Size</th>
                            <th class="p-3 text-right">Available Quantity</th>
                        </tr>
                    </thead>
                    <tbody id="stockBody">
                        </tbody>
                </table>
            </div>
        </section>

        <section id="history" class="page-content hidden">
            <div class="bg-white p-8 rounded-xl shadow-md">
                <h2 class="text-2xl font-bold mb-6 text-gray-800">Transaction History</h2>
                <div class="mb-4">
                    <input type="date" id="dateFilter" onchange="filterHistory()" class="p-2 border rounded-md">
                </div>
                <div class="overflow-x-auto">
                    <table class="w-full text-left">
                        <thead class="bg-gray-50 border-b">
                            <tr>
                                <th class="p-3 text-sm">Date</th>
                                <th class="p-3 text-sm">Size</th>
                                <th class="p-3 text-sm">Type</th>
                                <th class="p-3 text-sm">Qty</th>
                            </tr>
                        </thead>
                        <tbody id="historyBody" class="text-sm">
                            </tbody>
                    </table>
                </div>
            </div>
        </section>

    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, set, push, onValue, get } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        // Replace with YOUR Firebase Config
        const firebaseConfig = {
            apiKey: "AIzaSyDartNmxZuUnr6UK47750OZlUh9o8ZYwwo",
            databaseURL: "https://inventory-management-sof-1acfb-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "inventory-management-sof-1acfb",
            appId: "1:964690589517:web:dafcc08eea18c3db766904"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // --- Navigation ---
        window.showPage = (pageId) => {
            document.querySelectorAll('.page-content').forEach(p => p.classList.add('hidden'));
            document.getElementById(pageId).classList.remove('hidden');
        };

        // --- Handle Entry ---
        document.getElementById('entryForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const size = document.getElementById('size').value;
            const type = document.getElementById('type').value;
            const qty = parseInt(document.getElementById('qty').value);
            const date = new Date().toISOString().split('T')[0];

            // 1. Get current stock for validation
            const stockRef = ref(db, `stock/${size.replace('/','-')}`);
            const snapshot = await get(stockRef);
            let currentStock = snapshot.exists() ? snapshot.val() : 0;

            // 2. Validate
            if (type === 'Sales' && currentStock < qty) {
                alert("Insufficient stock! You only have " + currentStock + " items.");
                return;
            }

            // 3. Update History
            const historyRef = ref(db, 'history');
            push(historyRef, { size, type, qty, date });

            // 4. Update Stock
            const newStock = type === 'Purchase' ? currentStock + qty : currentStock - qty;
            set(stockRef, newStock);

            alert("Entry saved successfully!");
            e.target.reset();
        });

        // --- Real-time Stock Sync ---
        onValue(ref(db, 'stock'), (snapshot) => {
            const data = snapshot.val();
            const body = document.getElementById('stockBody');
            body.innerHTML = "";
            if(data) {
                Object.keys(data).forEach(key => {
                    const row = `<tr>
                        <td class="p-3 border-b">${key.replace('-','/')}</td>
                        <td class="p-3 border-b text-right font-bold text-blue-600">${data[key]}</td>
                    </tr>`;
                    body.innerHTML += row;
                });
            }
        });

        // --- Real-time History Sync ---
        window.allHistory = [];
        onValue(ref(db, 'history'), (snapshot) => {
            const data = snapshot.val();
            const body = document.getElementById('historyBody');
            body.innerHTML = "";
            window.allHistory = [];
            if(data) {
                Object.values(data).reverse().forEach(entry => {
                    window.allHistory.push(entry);
                    renderRow(entry);
                });
            }
        });

        function renderRow(entry) {
            const body = document.getElementById('historyBody');
            const row = `<tr class="border-b hover:bg-gray-50">
                <td class="p-3">${entry.date}</td>
                <td class="p-3">${entry.size}</td>
                <td class="p-3 font-semibold ${entry.type === 'Sales' ? 'text-red-500' : 'text-green-500'}">${entry.type}</td>
                <td class="p-3">${entry.qty}</td>
            </tr>`;
            body.innerHTML += row;
        }

        window.filterHistory = () => {
            const date = document.getElementById('dateFilter').value;
            const body = document.getElementById('historyBody');
            body.innerHTML = "";
            window.allHistory.filter(e => !date || e.date === date).forEach(renderRow);
        };

        // --- PDF Export ---
        window.exportPDF = () => {
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF();
            doc.text("Latest Inventory Stock", 14, 15);
            doc.autoTable({ html: '#stockTable', startY: 20 });
            doc.save(`Stock_Report_${new Date().toLocaleDateString()}.pdf`);
        };
    </script>
</body>
</html>
